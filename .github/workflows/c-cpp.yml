name: C/C++ CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:

    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: make
      run: |
        sudo apt-get update
        sudo apt-get install -y autoconf build-essential cmake g++ git libcurl4-gnutls-dev libboost-date-time-dev libboost-program-options-dev libboost-system-dev libboost-filesystem-dev libboost-iostreams-dev libbz2-dev libdeflate-dev liblzma-dev zlib1g-dev pkg-config
        make
